# WhatTools Helm Values
# ============================================================================

global:
  # Container registry prefix (set to your registry, e.g. ghcr.io/yourorg)
  imageRegistry: "whattools"
  imagePullPolicy: IfNotPresent
  # Set to a specific tag for production deploys (never use "latest" in prod)
  imageTag: "latest"

# -- Namespace ----------------------------------------------------------------
namespace: whattools

# -- Domain & TLS -------------------------------------------------------------
ingress:
  enabled: true
  className: traefik
  host: whattools.trector.com
  grafanaHost: grafana.whattools.trector.com
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod
  annotations: {}

# -- Secrets ------------------------------------------------------------------
# For production: use SealedSecrets or external-secrets-operator.
# These plaintext values are for LOCAL DEV ONLY — never commit real secrets.
secrets:
  # Set to "SealedSecret" to use Bitnami SealedSecrets instead of plain Secret
  kind: Secret
  secretKey: "change-me-to-a-random-64-char-string"
  jwtSecretKey: "change-me-to-a-different-64-char-string"
  databaseUrl: "postgresql://whattools:whattools@postgres:5432/whattools"
  redisUrl: "redis://redis:6379/0"
  postgresPassword: "whattools"
  grafanaAdminPassword: "admin"
  # Only used when kind=SealedSecret — paste your encrypted values here
  sealed: {}

# -- PostgreSQL ---------------------------------------------------------------
postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 10Gi
  storageClass: ""  # Use default storage class
  resources:
    requests: { memory: 256Mi, cpu: 250m }
    limits:   { memory: 512Mi, cpu: 500m }

# -- Redis --------------------------------------------------------------------
redis:
  enabled: true
  image: redis:7-alpine
  storage: 2Gi
  storageClass: ""
  resources:
    requests: { memory: 128Mi, cpu: 100m }
    limits:   { memory: 256Mi, cpu: 250m }

# -- Microservice defaults (can be overridden per-service) --------------------
serviceDefaults:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  resources:
    requests: { memory: 256Mi, cpu: 250m }
    limits:   { memory: 512Mi, cpu: 500m }
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      path: /ready
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  # PodDisruptionBudget
  pdb:
    enabled: true
    minAvailable: 1

# -- Per-service overrides ----------------------------------------------------
services:
  gateway:
    port: 5000
    replicas: 2
    resources:
      requests: { memory: 128Mi, cpu: 100m }
      limits:   { memory: 256Mi, cpu: 250m }
    probes:
      liveness:  { path: /health }
      readiness: { path: /health }

  auth:
    port: 5001

  inventory:
    port: 5002

  sales:
    port: 5003

  analytics:
    port: 5004

  shipping:
    port: 5005

# -- Analytics Worker (Celery) ------------------------------------------------
analyticsWorker:
  replicas: 1
  resources:
    requests: { memory: 256Mi, cpu: 250m }
    limits:   { memory: 512Mi, cpu: 500m }
  exportStorage: 10Gi

# -- Web Frontend -------------------------------------------------------------
web:
  replicas: 2
  port: 80
  resources:
    requests: { memory: 64Mi, cpu: 50m }
    limits:   { memory: 128Mi, cpu: 100m }
  probes:
    liveness:  { path: /health }
    readiness: { path: /health }
  pdb:
    enabled: true
    minAvailable: 1

# -- HPA (Horizontal Pod Autoscaler) -----------------------------------------
autoscaling:
  enabled: true
  # Per-service HPA configs
  gateway:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  auth:
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  inventory:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  sales:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  analytics:
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  shipping:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  web:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# -- Network Policies --------------------------------------------------------
networkPolicies:
  enabled: true

# -- Database Migrations (init container) -------------------------------------
migrations:
  enabled: true
  image: ""  # defaults to auth service image (has alembic)

# -- Observability (Loki + Promtail + Grafana) --------------------------------
observability:
  enabled: true

  loki:
    image: grafana/loki:3.0.0
    storage: 10Gi
    retentionPeriod: 720h
    resources:
      requests: { memory: 256Mi, cpu: 100m }
      limits:   { memory: 512Mi, cpu: 250m }

  promtail:
    image: grafana/promtail:3.0.0
    resources:
      requests: { memory: 64Mi, cpu: 50m }
      limits:   { memory: 128Mi, cpu: 100m }

  grafana:
    image: grafana/grafana:11.1.0
    storage: 2Gi
    resources:
      requests: { memory: 128Mi, cpu: 100m }
      limits:   { memory: 256Mi, cpu: 250m }
