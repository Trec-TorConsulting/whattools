{{- if eq .Values.secrets.kind "Secret" }}
apiVersion: v1
kind: Secret
metadata:
  name: whattools-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "whattools.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
{{- end }}
{{- if eq .Values.secrets.kind "SealedSecret" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: whattools-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "whattools.labels" . | nindent 4 }}
spec:
  encryptedData:
    {{- range $key, $value := .Values.secrets.sealed }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  template:
    metadata:
      name: whattools-secrets
      namespace: {{ .Values.namespace }}
    type: Opaque
{{- end }}
