apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: export-storage
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "whattools.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: {{ .Values.analyticsWorker.exportStorage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: analytics-worker
    {{- include "whattools.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.analyticsWorker.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: analytics-worker
  template:
    metadata:
      labels:
        app: analytics-worker
        {{- include "whattools.labels" . | nindent 8 }}
    spec:
      containers:
        - name: worker
          image: {{ include "whattools.image" (dict "global" .Values.global "name" "analytics-worker") }}
          {{- include "whattools.envFrom" . | nindent 10 }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: whattools-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: whattools-secrets
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              value: "redis://redis:6379/2"
            - name: CELERY_RESULT_BACKEND
              value: "redis://redis:6379/2"
          # Celery worker liveness — check that the worker process responds
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.analyticsWorker.resources | nindent 12 }}
          {{- include "whattools.securityContext" .Values.serviceDefaults.securityContext | nindent 10 }}
          volumeMounts:
            - name: export-storage
              mountPath: /data/exports
      volumes:
        - name: export-storage
          persistentVolumeClaim:
            claimName: export-storage
