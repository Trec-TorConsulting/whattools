{{- if .Values.networkPolicies.enabled }}
# Default deny all ingress — each service explicitly allows what it needs
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "whattools.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress]

# Allow gateway to receive traffic from ingress controller
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-gateway
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: gateway
  ingress:
    - ports:
        - port: {{ .Values.services.gateway.port }}

# Allow web to receive traffic from ingress controller
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-web
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: web
  ingress:
    - ports:
        - port: {{ .Values.web.port }}

# Allow gateway to reach all backend services
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-services
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: whattools
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - port: 5001
        - port: 5002
        - port: 5003
        - port: 5004
        - port: 5005

# Allow all services to reach PostgreSQL
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-postgres
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: postgres
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: whattools
      ports:
        - port: 5432

# Allow all services to reach Redis
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-redis
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: redis
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: whattools
      ports:
        - port: 6379

{{- if .Values.observability.enabled }}
# Allow Grafana to reach Loki
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-to-loki
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: loki
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: grafana
        - podSelector:
            matchLabels:
              app: promtail
      ports:
        - port: 3100

# Allow ingress to Grafana
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-grafana
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: grafana
  ingress:
    - ports:
        - port: 3000
{{- end }}
{{- end }}
