{{- $gw := .Values.services.gateway -}}
{{- $defaults := .Values.serviceDefaults -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway
    {{- include "whattools.labels" . | nindent 4 }}
spec:
  replicas: {{ $gw.replicas | default $defaults.replicas }}
  strategy:
    {{- toYaml $defaults.strategy | nindent 4 }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        {{- include "whattools.labels" . | nindent 8 }}
    spec:
      containers:
        - name: gateway
          image: {{ include "whattools.image" (dict "global" .Values.global "name" "gateway") }}
          ports:
            - name: http
              containerPort: {{ $gw.port }}
          {{- include "whattools.envFrom" . | nindent 10 }}
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: whattools-secrets
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: whattools-secrets
                  key: SECRET_KEY
          {{- $probes := $gw.probes | default $defaults.probes }}
          {{- include "whattools.livenessProbe" $probes.liveness | nindent 10 }}
          {{- include "whattools.readinessProbe" ($probes.readiness | default $probes.liveness) | nindent 10 }}
          resources:
            {{- toYaml ($gw.resources | default $defaults.resources) | nindent 12 }}
          {{- include "whattools.securityContext" $defaults.securityContext | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway
    {{- include "whattools.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $gw.port }}
      targetPort: http
      name: http
  selector:
    app: gateway
{{- if ($defaults.pdb).enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway
    {{- include "whattools.labels" . | nindent 4 }}
spec:
  minAvailable: {{ $defaults.pdb.minAvailable }}
  selector:
    matchLabels:
      app: gateway
{{- end }}
