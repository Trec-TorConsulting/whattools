# WhatTools local development environment
# Usage: docker compose up -d

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whattools
      POSTGRES_PASSWORD: whattools
      POSTGRES_DB: whattools
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whattools"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Application Services ---
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      - DATABASE_URL=postgresql://whattools:whattools@postgres:5432/whattools
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret}
      - JWT_ACCESS_TOKEN_EXPIRES=${JWT_ACCESS_TOKEN_EXPIRES:-900}
      - JWT_REFRESH_TOKEN_EXPIRES=${JWT_REFRESH_TOKEN_EXPIRES:-604800}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PAID_PRICE_ID=${STRIPE_PAID_PRICE_ID:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  inventory:
    build:
      context: .
      dockerfile: services/inventory/Dockerfile
    environment:
      - DATABASE_URL=postgresql://whattools:whattools@postgres:5432/whattools
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      - AUTH_SERVICE_URL=http://auth:5001
      - INVENTORY_SERVICE_URL=http://inventory:5002
      - SALES_SERVICE_URL=http://sales:5003
      - ANALYTICS_SERVICE_URL=http://analytics:5004
      - SHIPPING_SERVICE_URL=http://shipping:5005
      - WHATNOT_SERVICE_URL=http://whatnot:5006
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-60/minute}
    ports:
      - "5000:5000"
    depends_on:
      auth:
        condition: service_healthy
      inventory:
        condition: service_healthy
      sales:
        condition: service_healthy
      analytics:
        condition: service_healthy
      shipping:
        condition: service_healthy
      whatnot:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  sales:
    build:
      context: .
      dockerfile: services/sales/Dockerfile
    environment:
      - DATABASE_URL=postgresql://whattools:whattools@postgres:5432/whattools
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5003/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    environment:
      - DATABASE_URL=postgresql://whattools:whattools@postgres:5432/whattools
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "5004:5004"
    volumes:
      - export_data:/data/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5004/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  analytics-worker:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql://whattools:whattools@postgres:5432/whattools
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - EXPORTS_DIR=/data/exports
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - export_data:/data/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  shipping:
    build:
      context: .
      dockerfile: services/shipping/Dockerfile
    environment:
      - DATABASE_URL=postgresql://whattools:whattools@postgres:5432/whattools
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "5005:5005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5005/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  whatnot:
    build:
      context: .
      dockerfile: services/whatnot/Dockerfile
    environment:
      - DATABASE_URL=postgresql://whattools:whattools@postgres:5432/whattools
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - WHATNOT_CLIENT_ID=${WHATNOT_CLIENT_ID:-}
      - WHATNOT_CLIENT_SECRET=${WHATNOT_CLIENT_SECRET:-}
      - WHATNOT_REDIRECT_URI=${WHATNOT_REDIRECT_URI:-http://localhost:3000/whatnot/callback}
      - WHATNOT_ENCRYPTION_KEY=${WHATNOT_ENCRYPTION_KEY:-EgOSrH8cdaI0W4fLy4A8a8DSs6zDr3TIk5yupSsROxs=}
      - WHATNOT_WEBHOOK_SECRET=${WHATNOT_WEBHOOK_SECRET:-dev-webhook-secret}
      - WHATNOT_USE_STAGING=${WHATNOT_USE_STAGING:-false}
    ports:
      - "5006:5006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5006/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  whatnot-worker:
    build:
      context: .
      dockerfile: services/whatnot/Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql://whattools:whattools@postgres:5432/whattools
      - CELERY_BROKER_URL=redis://redis:6379/3
      - CELERY_RESULT_BACKEND=redis://redis:6379/3
      - WHATNOT_CLIENT_ID=${WHATNOT_CLIENT_ID:-}
      - WHATNOT_CLIENT_SECRET=${WHATNOT_CLIENT_SECRET:-}
      - WHATNOT_ENCRYPTION_KEY=${WHATNOT_ENCRYPTION_KEY:-EgOSrH8cdaI0W4fLy4A8a8DSs6zDr3TIk5yupSsROxs=}
      - WHATNOT_USE_STAGING=${WHATNOT_USE_STAGING:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Web UI ---
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  export_data:
