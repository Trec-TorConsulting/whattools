# Auth Service Deployment + Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: whattools
  labels:
    app: auth
    app.kubernetes.io/part-of: whattools
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: whattools/auth:latest
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: whattools-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: whattools-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: whattools-secrets
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: whattools-secrets
                  key: SECRET_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: whattools-secrets
                  key: JWT_SECRET_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: whattools
spec:
  selector:
    app: auth
  ports:
    - port: 5001
      targetPort: 5001
  type: ClusterIP
