# Gateway Service Deployment + Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: whattools
  labels:
    app: gateway
    app.kubernetes.io/part-of: whattools
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: whattools/gateway:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: whattools-config
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: whattools-secrets
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: whattools-secrets
                  key: SECRET_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: whattools
spec:
  selector:
    app: gateway
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
